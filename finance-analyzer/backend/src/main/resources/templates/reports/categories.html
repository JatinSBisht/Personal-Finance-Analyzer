<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Category Report | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<main class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold mb-0">Category-wise Expense Report</h1>
        <a th:href="@{/dashboard}">Back to dashboard</a>
    </div>
    <section class="panel">
        <table class="table align-middle">
            <thead><tr><th>Category</th><th class="text-end">Amount</th></tr></thead>
            <tbody>
            <tr th:each="row : ${categoryReport}">
                <td th:text="${row.category}"></td>
                <td class="text-end" th:text="${#numbers.formatCurrency(row.amount)}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(categoryReport)}"><td colspan="2" class="text-center text-muted py-4">No expenses recorded.</td></tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
