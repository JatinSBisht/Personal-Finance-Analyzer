<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monthly Report | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<main class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold mb-0">Monthly Summary</h1>
        <a th:href="@{/dashboard}">Back to dashboard</a>
    </div>
    <section class="panel mb-4">
        <form class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Month</label>
                <input class="form-control" name="month" type="month" th:value="${month}">
            </div>
            <div class="col-md-2"><button class="btn btn-dark" type="submit">View</button></div>
        </form>
    </section>
    <div class="row g-3">
        <div class="col-md-4"><div class="metric"><span>Income</span><strong th:text="${#numbers.formatCurrency(summary.income)}"></strong></div></div>
        <div class="col-md-4"><div class="metric"><span>Expense</span><strong th:text="${#numbers.formatCurrency(summary.expense)}"></strong></div></div>
        <div class="col-md-4"><div class="metric"><span>Balance</span><strong th:text="${#numbers.formatCurrency(summary.balance)}"></strong></div></div>
    </div>
    <div class="mt-4"><a class="btn btn-outline-primary" th:href="@{/reports/categories}">Category-wise Report</a></div>
</main>
</body>
</html>
