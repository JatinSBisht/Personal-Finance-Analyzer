<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <p class="text-uppercase text-muted small fw-semibold mb-2">Smart Personal Finance Analyzer</p>
        <h1 class="h3 fw-bold mb-4">Create account</h1>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3">
                <label class="form-label" for="fullName">Full name</label>
                <input class="form-control" id="fullName" th:field="*{fullName}" required>
                <div class="text-danger small" th:errors="*{fullName}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" th:field="*{email}" type="email" required>
                <div class="text-danger small" th:errors="*{email}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" th:field="*{password}" type="password" minlength="6" required>
                <div class="text-danger small" th:errors="*{password}"></div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <p class="mt-4 mb-0 text-muted">Already registered? <a th:href="@{/login}">Login</a></p>
    </section>
</main>
</body>
</html>
