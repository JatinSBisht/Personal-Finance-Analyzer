<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transactions | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">Smart Finance</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/transactions}">Transactions</a>
            <a class="nav-link" th:href="@{/reports/monthly}">Reports</a>
            <a class="nav-link" th:href="@{/budget}">Budget</a>
        </div>
    </div>
</nav>
<main class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold mb-0">Transactions</h1>
        <a class="btn btn-primary" th:href="@{/transactions/new}">Add Transaction</a>
    </div>
    <section class="panel mb-4">
        <form class="row g-3">
            <div class="col-md-3">
                <input class="form-control" name="keyword" placeholder="Search title">
            </div>
            <div class="col-md-2">
                <select class="form-select" name="type">
                    <option value="">All types</option>
                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="col-md-2"><input class="form-control" name="fromDate" type="date"></div>
            <div class="col-md-2"><input class="form-control" name="toDate" type="date"></div>
            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-dark" type="submit">Filter</button>
                <a class="btn btn-outline-secondary" th:href="@{/transactions}">Reset</a>
            </div>
        </form>
    </section>
    <section class="panel">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Type</th><th class="text-end">Amount</th><th></th></tr></thead>
                <tbody>
                <tr th:each="txn : ${transactions}">
                    <td th:text="${txn.transactionDate}"></td>
                    <td><strong th:text="${txn.title}"></strong><div class="small text-muted" th:text="${txn.note}"></div></td>
                    <td th:text="${txn.category.name}"></td>
                    <td><span class="badge" th:classappend="${txn.type.name() == 'INCOME'} ? ' text-bg-success' : ' text-bg-danger'" th:text="${txn.type}"></span></td>
                    <td class="text-end" th:text="${#numbers.formatCurrency(txn.amount)}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/transactions/{id}/edit(id=${txn.id})}">Edit</a>
                        <form class="d-inline" th:action="@{/transactions/{id}/delete(id=${txn.id})}" method="post">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(transactions)}"><td colspan="6" class="text-center text-muted py-4">No transactions found.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
