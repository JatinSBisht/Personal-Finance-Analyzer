<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transaction | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">Smart Finance</a>
    </div>
</nav>
<main class="container py-4">
    <section class="panel mx-auto form-panel">
        <h1 class="h4 fw-bold mb-4">Transaction Details</h1>
        <form th:action="${transaction.id == null} ? @{/transactions} : @{/transactions}" th:object="${transaction}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" th:field="*{title}" required>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Amount</label>
                    <input class="form-control" th:field="*{amount}" type="number" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date</label>
                    <input class="form-control" th:field="*{transactionDate}" type="date" required>
                </div>
            </div>
            <div class="my-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="categoryId" required>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name + ' - ' + category.type}" th:selected="${transaction.category != null and transaction.category.id == category.id}"></option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Note</label>
                <textarea class="form-control" th:field="*{note}" rows="3"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary" th:href="@{/transactions}">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
