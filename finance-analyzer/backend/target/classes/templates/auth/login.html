<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Smart Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <p class="text-uppercase text-muted small fw-semibold mb-2">Smart Personal Finance Analyzer</p>
        <h1 class="h3 fw-bold mb-4">Welcome back</h1>
        <div th:if="${param.error}" class="alert alert-danger">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
        <p class="mt-4 mb-0 text-muted">New here? <a th:href="@{/register}">Create an account</a></p>
    </section>
</main>
</body>
</html>
